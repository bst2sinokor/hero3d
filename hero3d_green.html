<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>히어로 3D — 그린파워 (차수 매립)</title>
<link rel="stylesheet" href="css/style.css">
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #dcebf7; }
  #stage3d { position: fixed; inset: 0; }
  #stage3d canvas { display: block; width: 100%; height: 100%; }
  #hud { position: absolute; left: 0; right: 0; top: 30px; text-align: center; pointer-events: none; z-index: 3; }
  #hud .cap {
    display: inline-block; padding: 14px 30px; border-radius: 14px;
    background: rgba(12,22,34,0.55); backdrop-filter: blur(6px);
    color: #fff; font-size: clamp(20px, 2.4vw, 34px); font-weight: 800; letter-spacing: -0.01em;
    opacity: 0; transform: translateY(12px);
  }
  #hud .cap .hl { color: #5ee0b0; }
  #controls { position: absolute; right: 22px; bottom: 18px; z-index: 5; display: flex; gap: 8px; }
  #controls button {
    font-family: inherit; font-size: 15px; font-weight: 700; color: #0b1622;
    background: #fff; border: none; padding: 10px 16px; border-radius: 10px; cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,0,0,0.3);
  }
  #controls button:hover { background: #eef3f7; }
  #scenelabel {
    position: absolute; left: 22px; bottom: 22px; z-index: 5;
    font-family: inherit; font-size: 14px; font-weight: 700; color: #0b1622;
    background: rgba(255,255,255,0.82); padding: 7px 14px; border-radius: 9px;
  }
  /* 지층 명칭 라벨 — 각 층 좌측 앞모서리에 배치 (hero3d.html과 통일) */
  .layerTag { position: absolute; z-index: 5; opacity: 0; transition: opacity 0.5s ease;
    transform: translate(calc(-100% - 18px), -50%); white-space: nowrap;
    font-family: inherit; font-size: 14px; font-weight: 800; color: #0b1622;
    background: rgba(255,255,255,0.92); padding: 6px 12px; border-radius: 8px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.3); }
  .layerTag small { font-weight: 700; color: #5a6675; font-size: 12px; margin-left: 3px; }
  .layerTag::after { content: ''; position: absolute; right: -18px; top: 50%;
    width: 18px; height: 2px; background: rgba(255,255,255,0.92); transform: translateY(-50%); }
  .layerTag::before { content: ''; position: absolute; right: -18px; top: 50%;
    width: 8px; height: 8px; border-radius: 50%; background: #ffd23f;
    box-shadow: 0 0 0 2px rgba(255,255,255,0.92); transform: translate(50%, -50%); }
  /* 대상 위쪽에 두고 아래로 지시선 연결(집수정 등, 향후 병합 대비) */
  .layerTag.down { transform: translate(-50%, calc(-100% - 18px)); }
  .layerTag.down::after { right: auto; left: 50%; top: auto; bottom: -18px;
    width: 2px; height: 18px; transform: translateX(-50%); }
  .layerTag.down::before { right: auto; left: 50%; top: auto; bottom: -18px;
    transform: translate(-50%, 50%); }
  /* 레벨 라벨 — hero3d.html과 통일 */
  #levelTag { position: absolute; z-index: 5; opacity: 0; transition: opacity 0.4s;
    transform: translate(6px, -50%); background: rgba(12,22,34,0.72); color: #ffd23f;
    font-size: 18px; font-weight: 800; padding: 4px 11px; border-radius: 8px;
    border: 2px solid #ffd23f; white-space: nowrap; }
  /* 진공압 게이지 — 진공펌프 옆에 투영 배치 */
  #vacGauge { position: absolute; z-index: 4; opacity: 0; transition: opacity 0.5s ease; text-align: center; pointer-events: none; transform: translate(-50%, -50%); }
  #vacGauge canvas { width: 132px; height: 132px; display: block; filter: drop-shadow(0 8px 20px rgba(0,0,0,0.5)); }
  #vacGauge .glbl { color: #fff; font-size: 13px; font-weight: 800; margin-top: 4px; text-shadow: 0 1px 4px rgba(0,0,0,0.8); }
  /* 렌즈(미시 단면 확대) + 콜아웃 지시선 — hero3d.html과 통일 */
  #callout { position: fixed; inset: 0; z-index: 3; pointer-events: none; opacity: 0; transition: opacity 0.5s ease; width: 100%; height: 100%; }
  #coLine { stroke: #fff; stroke-width: 2.5; stroke-dasharray: 7 7; }
  #coRing { fill: rgba(255,210,63,0.12); stroke: #ffd23f; stroke-width: 3.5; }
  #lenswrap { position: absolute; left: 320px; bottom: 90px; z-index: 4; opacity: 0; transition: opacity 0.6s ease; pointer-events: none; }
  #lens { width: 270px; height: 270px; border-radius: 50%; border: 5px solid #fff; box-shadow: 0 10px 34px rgba(0,0,0,0.5); display: block; }
  #lenscap { text-align: center; color: #fff; font-size: 14px; font-weight: 700; margin-top: 10px; text-shadow: 0 1px 5px rgba(0,0,0,0.7); }

  /* ===== 모바일 반응형 ===== */
  @media (max-width: 900px) {
    #hud { top: 16px; padding: 0 12px; }
    #hud .cap { padding: 10px 18px; font-size: clamp(14px, 3vw, 22px); border-radius: 10px; }
    #controls { right: 10px; bottom: 10px; gap: 5px; }
    #controls button { font-size: 12px; padding: 7px 11px; border-radius: 8px; }
    #scenelabel { left: 10px; bottom: 10px; font-size: 12px; padding: 5px 10px; }
    #lenswrap { left: 20px; bottom: 20px; }
    #lens { width: 180px; height: 180px; border-width: 3px; }
    #lenscap { font-size: 11px; margin-top: 6px; }
    #levelTag { font-size: 14px; padding: 3px 8px; }
    .layerTag { font-size: 11px; padding: 4px 8px; }
    .layerTag small { font-size: 10px; }
  }
  @media (max-width: 600px) {
    #hud { top: 12px; }
    #hud .cap { padding: 7px 12px; font-size: 13px; }
    #controls { right: 6px; bottom: 6px; gap: 4px; flex-wrap: wrap; justify-content: flex-end; max-width: 62%; }
    #controls button { font-size: 11px; padding: 6px 8px; }
    #scenelabel { font-size: 11px; padding: 4px 8px; }
    #lenswrap { left: 12px; bottom: 12px; }
    #lens { width: 140px; height: 140px; border-width: 2px; }
    #lenscap { font-size: 10px; margin-top: 4px; }
    .layerTag { font-size: 10px; padding: 3px 6px; transform: translate(calc(-100% - 12px), -50%); }
    .layerTag::after { right: -12px; width: 12px; }
    .layerTag::before { right: -12px; }
  }
</style>
</head>
<body>
  <div id="stage3d"></div>
  <div id="scenelabel">씬 1 · 바다</div>
  <div id="controls">
    <button id="prev">◀ 이전 씬</button>
    <button id="pause">⏸ 일시정지</button>
    <button id="next">다음 씬 ▶</button>
    <button id="replay">⟲ 다시 보기</button>
  </div>
  <div class="layerTag" id="ltFill">바다</div>
  <div class="layerTag" id="ltClay">연약점토층</div>
  <div class="layerTag" id="ltRock">기반암</div>
  <div class="layerTag" id="ltCap">최종복토층</div>
  <div class="layerTag down" id="ltTF">오염수 처리시설</div>
  <div class="layerTag down" id="ltWH">물류창고</div>
  <div id="levelTag"></div>
  <div id="vacGauge"><canvas id="vacDial" width="150" height="150"></canvas><div class="glbl">진공압</div></div>
  <svg id="callout"><line id="coLine"></line><circle id="coRing"></circle></svg>
  <div id="lenswrap"><canvas id="lens"></canvas><div id="lenscap">흙 속 — 입자 재정렬 · 간극수 PBD 배출</div></div>
  <div id="hud"><div class="cap" id="cap"></div></div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
    }
  }
  </script>
  <!-- file:// 에서도 동작하도록 인라인 모듈 + https CDN import -->
  <script type="module">
// ================================================
// 히어로 3D — 그린파워(차수성 위생매립)  ※ hero3d.html(웅동)과 병합 예정
// 공용 골격(렌더러·HDRI·PBR·카메라·조명·굴착기)은 동일.
// 그린파워 전용 객체는 g_ 접두사로 작성(병합 시 충돌 방지).
// 현재: 씬 6 — 부지 굴착.
// ================================================
import * as THREE from 'three';
import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

const gsap = window.gsap;
const stageEl = document.getElementById('stage3d');
const cap = document.getElementById('cap');

// ---------- 렌더러 ----------
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.localClippingEnabled = true;   // 굴착(위→아래 제거) 클리핑
stageEl.appendChild(renderer.domElement);

// ---------- 씬 / 하늘 ----------
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0xdcebf7, 5200, 11000);
function skyTexture() {
  const c = document.createElement('canvas'); c.width = 4; c.height = 512;
  const g = c.getContext('2d');
  const grad = g.createLinearGradient(0, 0, 0, 512);
  grad.addColorStop(0.00, '#bcdcf5'); grad.addColorStop(0.55, '#d8ecf9'); grad.addColorStop(1.00, '#eef6fb');
  g.fillStyle = grad; g.fillRect(0, 0, 4, 512);
  const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace; return t;
}
scene.background = skyTexture();
new RGBELoader().load(
  'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r170/examples/textures/equirectangular/venice_sunset_1k.hdr',
  (hdr) => { const pm = new THREE.PMREMGenerator(renderer); scene.environment = pm.fromEquirectangular(hdr).texture; scene.environmentIntensity = 0.55; hdr.dispose(); pm.dispose(); }
);

// ---------- PBR 텍스처 ----------
const texLoader = new THREE.TextureLoader();
const PH = 'https://dl.polyhaven.org/file/ph-assets/Textures/jpg/1k';
function loadPBR(asset, rx, ry, opts = {}) {
  const url = m => `${PH}/${asset}/${asset}_${m}_1k.jpg`;
  const diff = texLoader.load(url('diff')); diff.colorSpace = THREE.SRGBColorSpace;
  const nor = texLoader.load(url('nor_gl'));
  const rough = texLoader.load(url('rough'));
  [diff, nor, rough].forEach(t => { t.wrapS = t.wrapT = THREE.RepeatWrapping; t.repeat.set(rx, ry); t.anisotropy = 4; });
  return new THREE.MeshStandardMaterial({ map: diff, normalMap: nor, roughnessMap: rough, roughness: 1, metalness: 0, ...opts });
}
const matRock = loadPBR('rocky_terrain_02', 8, 1);
const matSoft = loadPBR('brown_mud_dry', 1, 1);           // 연약토(원지반). UV는 world/TS 사용 → 반복 1
const matFill = loadPBR('sandy_gravel', 1, 1);            // 준설토 매립층(씬1~2서 조성 — 웅동과 공통). UV는 world/TS 사용 → 반복 1
const matFillPit = matFill.clone();                       // 굴착으로 제거될 매립층(클립)

// ---------- 카메라 (웅동과 동일 3/4 단면 뷰) ----------
const camera = new THREE.PerspectiveCamera(38, innerWidth / innerHeight, 1, 12000);
const cam = { px: 1820, py: 1120, pz: 2380, tx: 0, ty: -150, tz: 0 };
function applyCam() { camera.position.set(cam.px, cam.py, cam.pz); camera.lookAt(cam.tx, cam.ty, cam.tz); }
applyCam();

// ---------- 조명 ----------
const hemi = new THREE.HemisphereLight(0xeaf4ff, 0x9c8255, 0.95); scene.add(hemi);
const sun = new THREE.DirectionalLight(0xfff1d2, 1.7);
sun.position.set(-700, 760, 520); sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048); sun.shadow.camera.near = 100; sun.shadow.camera.far = 4000;
sun.shadow.camera.left = -1800; sun.shadow.camera.right = 1800; sun.shadow.camera.top = 1800; sun.shadow.camera.bottom = -1800;
sun.shadow.bias = -0.0006; scene.add(sun); scene.add(sun.target);
function sunSprite(size) {
  const c = document.createElement('canvas'); c.width = c.height = 256; const g = c.getContext('2d');
  const rg = g.createRadialGradient(128, 128, 0, 128, 128, 128);
  rg.addColorStop(0.00, 'rgba(255,253,244,1)'); rg.addColorStop(0.16, 'rgba(255,247,222,1)');
  rg.addColorStop(0.30, 'rgba(255,233,180,0.55)'); rg.addColorStop(0.62, 'rgba(255,226,165,0.16)'); rg.addColorStop(1.00, 'rgba(255,226,165,0)');
  g.fillStyle = rg; g.fillRect(0, 0, 256, 256);
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c), transparent: true, depthWrite: false, blending: THREE.AdditiveBlending, fog: false }));
  sp.scale.set(size, size, 1); return sp;
}
const sunGlow = sunSprite(1700); sunGlow.position.set(-1350, 600, -3600); scene.add(sunGlow);

// ================================================
//  부지 블록 (웅동과 동일 좌표·지층) — 씬1~2서 조성한 '준설토 매립층'을 굴착
//  지층(아래→위): 암반 / 연약토(원지반) / 준설토 매립층(GROUND)
//  굴착: 매립층을 관통해 연약토 중간까지 셀(사다리꼴) 형성
// ================================================
const GROUND = 40, Wd = 2400, Dp = 1400, FRONT = Dp / 2;
const SEABED = -160;               // 매립층 바닥 = 연약토 상단
const SOFT_BOT = -420;             // 연약토 두께 260 (암반과 교체)
const ROCK_BOT = -520;             // 암반 두께 100 (연약토와 교체)
// 매립 셀(사다리꼴): 상단 개구 ±900 → 바닥 ±520, 바닥은 연약토 중간(-290)
const PIT_TOPHW = 900, PIT_BOTHW = 520, PIT_BOT = -290;
function cellHW(y) { const tt = Math.max(0, Math.min(1, (GROUND - y) / (GROUND - PIT_BOT))); return PIT_TOPHW + (PIT_BOTHW - PIT_TOPHW) * tt; }
const HW_SEABED = cellHW(SEABED);  // 매립층 바닥에서의 셀 반폭
function rnd(a, b) { return a + Math.random() * (b - a); }

// 접지 그림자
function softShadowTex() {
  const c = document.createElement('canvas'); c.width = c.height = 256; const g = c.getContext('2d');
  const rg = g.createRadialGradient(128, 128, 10, 128, 128, 128);
  rg.addColorStop(0, 'rgba(20,30,40,0.42)'); rg.addColorStop(0.6, 'rgba(20,30,40,0.20)'); rg.addColorStop(1, 'rgba(20,30,40,0)');
  g.fillStyle = rg; g.fillRect(0, 0, 256, 256); return new THREE.CanvasTexture(c);
}
const groundShadow = new THREE.Mesh(new THREE.PlaneGeometry(Wd * 1.7, Dp * 1.9), new THREE.MeshBasicMaterial({ map: softShadowTex(), transparent: true, depthWrite: false }));
groundShadow.rotation.x = -Math.PI / 2; groundShadow.position.y = ROCK_BOT - 2; scene.add(groundShadow);

// ExtrudeGeometry 측벽/단면에 질감이 입혀지도록 UV 직접 매핑
const TS = 320;
const earthUV = {
  generateTopUV(g, v, a, b, c) {
    return [a, b, c].map(i => new THREE.Vector2(v[i * 3] / TS, v[i * 3 + 1] / TS));
  },
  generateSideWallUV(g, v, a, b, c, d) {
    const idx = [a, b, c, d];
    const ys = idx.map(i => v[i * 3 + 1]);
    const horizontal = (Math.max(...ys) - Math.min(...ys)) < 24;
    return idx.map(i => horizontal
      ? new THREE.Vector2(v[i * 3] / TS, v[i * 3 + 2] / TS)
      : new THREE.Vector2(v[i * 3 + 2] / TS, v[i * 3 + 1] / TS));
  }
};
function extrudeMesh(pts, mat, depth = Dp, steps = 1) {
  const s = new THREE.Shape(); s.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length; i++) s.lineTo(pts[i][0], pts[i][1]);
  s.closePath();
  const g = new THREE.ExtrudeGeometry(s, { depth, steps, bevelEnabled: false, UVGenerator: earthUV });
  g.translate(0, 0, -depth / 2);
  const m = new THREE.Mesh(g, mat); m.castShadow = true; m.receiveShadow = true; scene.add(m); return m;
}

// 암반(하부, 전체 박스 — 굴착 안 함)
const g_rock = new THREE.Mesh(new THREE.BoxGeometry(Wd, SOFT_BOT - ROCK_BOT, Dp), matRock);
g_rock.position.y = (SOFT_BOT + ROCK_BOT) / 2; g_rock.castShadow = true; g_rock.receiveShadow = true; scene.add(g_rock);

// 연약토(원지반) — 셀이 중간까지 파임. 셀 바닥 세그먼트와 z 방향 steps 모두 세분화 → 침하 변위 가능
const SOFT_FLOOR_SEGS = 28;
const softFloorMidPts = [];
for (let i = 1; i < SOFT_FLOOR_SEGS; i++) {
  const t = i / SOFT_FLOOR_SEGS;
  softFloorMidPts.push([PIT_BOTHW - 2 * PIT_BOTHW * t, PIT_BOT]);
}
const g_soft = extrudeMesh([
  [-Wd / 2, SOFT_BOT], [Wd / 2, SOFT_BOT], [Wd / 2, SEABED],
  [HW_SEABED, SEABED], [PIT_BOTHW, PIT_BOT],
  ...softFloorMidPts,
  [-PIT_BOTHW, PIT_BOT], [-HW_SEABED, SEABED],
  [-Wd / 2, SEABED]
], matSoft, Dp, 12);
// 셀 바닥 정점 인덱스(y≈PIT_BOT, x within ±PIT_BOTHW)
const g_softPos = g_soft.geometry.attributes.position;
const g_softFloorIdx = [];
for (let i = 0; i < g_softPos.count; i++) {
  if (Math.abs(g_softPos.getY(i) - PIT_BOT) < 0.5 && Math.abs(g_softPos.getX(i)) < PIT_BOTHW + 6) {
    g_softFloorIdx.push(i);
  }
}

// ================================================
//  씬 1·2용: 바다(수주+표면파) + 준설토 매립 성장 애니메이션
// ================================================
// 수주(water column) — 원지반 위 SEABED~수면까지 그라데이션 벽
const seaMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.45, transparent: true, opacity: 0.82, vertexColors: true });
const colGeo = new THREE.BoxGeometry(Wd - 10, 156, Dp - 10);
{
  const p = colGeo.attributes.position, arr = [];
  const cBot = new THREE.Color(0x0e3f63), cTop = new THREE.Color(0x3f9fd0), tmp = new THREE.Color();
  for (let i = 0; i < p.count; i++) {
    const tt = (p.getY(i) + 78) / 156;
    tmp.copy(cBot).lerp(cTop, tt); arr.push(tmp.r, tmp.g, tmp.b);
  }
  colGeo.setAttribute('color', new THREE.Float32BufferAttribute(arr, 3));
}
const waterCol = new THREE.Mesh(colGeo, seaMat);
waterCol.position.y = SEABED + 78; scene.add(waterCol);

// 표면파 — 파고에 따라 색이 살아 움직임(정점 컬러) + 마루 거품
const surfMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.16, metalness: 0.1, transparent: true, opacity: 0.9, vertexColors: true });
const seaGeo = new THREE.PlaneGeometry(Wd - 10, Dp - 10, 90, 52);
const sea = new THREE.Mesh(seaGeo, surfMat);
sea.rotation.x = -Math.PI / 2; sea.position.y = 0; scene.add(sea);
const WAVES = [
  { ax: 0.0040, az: 0.0060, a: 5.0, s: 0.9, p: 0.0 },
  { ax: 0.0090, az: 0.0120, a: 2.6, s: 1.5, p: 1.1 },
  { ax: 0.0160, az: 0.0200, a: 1.3, s: 2.3, p: 2.4 }
];
const AMP = WAVES.reduce((s, w) => s + w.a, 0);
const seaPos = seaGeo.attributes.position;
const seaCol = new THREE.Float32BufferAttribute(new Float32Array(seaPos.count * 3), 3);
seaGeo.setAttribute('color', seaCol);
const seaBaseX = new Float32Array(seaPos.count);
const seaBaseY = new Float32Array(seaPos.count);
for (let i = 0; i < seaPos.count; i++) { seaBaseX[i] = seaPos.getX(i); seaBaseY[i] = seaPos.getY(i); }
const cDeep = new THREE.Color(0x1d6699), cCrest = new THREE.Color(0x9fe0f6), cFoam = new THREE.Color(0xffffff), cw = new THREE.Color();
function updateSea(t) {
  if (!sea.visible) return;
  for (let i = 0; i < seaPos.count; i++) {
    const x = seaBaseX[i], y = seaBaseY[i];
    let z = 0;
    for (const w of WAVES) z += w.a * Math.sin(x * w.ax + y * w.az + w.s * t + w.p);
    seaPos.setZ(i, z);
    const tt = (z + AMP) / (2 * AMP);
    cw.copy(cDeep).lerp(cCrest, tt);
    if (tt > 0.82) cw.lerp(cFoam, (tt - 0.82) / 0.18 * 0.7);

// 셀 표면(소일)에서 안쪽으로 perpendicular distance d 만큼 들어간 단면 프로파일
//  - 바닥 내측: y = PIT_BOT + d (수직), 바닥폭은 약간 좁아짐
//  - 경사면: 안쪽으로 평행 이동, 상단은 지표(GROUND)에 고정
function linerProfile(d) {
  return [
    [-PIT_TOPHW + 1.524 * d, GROUND],          // top-left (rim)
    [-PIT_BOTHW + 0.374 * d, PIT_BOT + d],      // bottom-left
    [PIT_BOTHW - 0.374 * d, PIT_BOT + d],       // bottom-right
    [PIT_TOPHW - 1.524 * d, GROUND]             // top-right (rim)
  ];
}
function buildLinerLayer(d0, d1, mat) {
  const o = linerProfile(d0), i = linerProfile(d1);
  // outer/inner bottom 세그먼트 세분화 → 침하 변위 가능
  const LINER_BOT_SEGS = 24;
  const pts = [o[0], o[1]];
  for (let k = 1; k < LINER_BOT_SEGS; k++) {
    const t = k / LINER_BOT_SEGS;
    pts.push([o[1][0] + (o[2][0] - o[1][0]) * t, o[1][1]]);
  }
  pts.push(o[2], o[3], i[3], i[2]);
  for (let k = 1; k < LINER_BOT_SEGS; k++) {
    const t = k / LINER_BOT_SEGS;
    pts.push([i[2][0] + (i[1][0] - i[2][0]) * t, i[2][1]]);
  }
  pts.push(i[1], i[0]);
  const s = new THREE.Shape(); s.moveTo(pts[0][0], pts[0][1]);
  for (let k = 1; k < pts.length; k++) s.lineTo(pts[k][0], pts[k][1]);
  s.closePath();
  const depth = Dp - 20;
  const g = new THREE.ExtrudeGeometry(s, { depth, steps: 10, bevelEnabled: false, UVGenerator: earthUV });
  g.translate(0, 0, -depth / 2);
  const clip = new THREE.Plane(new THREE.Vector3(0, -1, 0), PIT_BOT - 6);
  mat.side = THREE.DoubleSide; mat.clippingPlanes = [clip]; mat.clipShadows = true;
  const m = new THREE.Mesh(g, mat); m.castShadow = true; m.receiveShadow = true; m.visible = false; scene.add(m);
  // outer/inner bottom 정점 인덱스 저장 → 침하 시 변위
  const pos = g.attributes.position;
  const outerBotIdx = [], innerBotIdx = [];
  const yOut = PIT_BOT + d0, yIn = PIT_BOT + d1;
  for (let k = 0; k < pos.count; k++) {
    const y = pos.getY(k), x = pos.getX(k);
    if (Math.abs(x) < PIT_BOTHW + 5) {
      if (Math.abs(y - yOut) < 0.5) outerBotIdx.push(k);
      else if (Math.abs(y - yIn) < 0.5) innerBotIdx.push(k);
    }
  }
  // 셀 후벽 패널
  const bs = new THREE.Shape(); bs.moveTo(o[0][0], o[0][1]);
  for (let k = 1; k < o.length; k++) bs.lineTo(o[k][0], o[k][1]);
  bs.closePath();
  const BACK_THICK = 2;
  const bg = new THREE.ExtrudeGeometry(bs, { depth: BACK_THICK, bevelEnabled: false, UVGenerator: earthUV });
  bg.translate(0, 0, -682 + d0 * 0.18);
  const bm = new THREE.Mesh(bg, mat); bm.castShadow = true; bm.receiveShadow = true; bm.visible = false; scene.add(bm);
  return { m, clip, bm, geom: g, pos, outerBotIdx, innerBotIdx, d0, d1 };
}

// 물류창고 footprint 범위 내에서 1, 가장자리로 갈수록 0 (cosine falloff) — hero3d.settleBump 패턴

function capSettleBump(x, z) {
  const rx = WH_W * 0.95, rz = WH_D * 0.95;
  const dx = (x - WH_X) / rx, dz = (z - WH_Z) / rz;
  const r = Math.sqrt(dx * dx + dz * dz);
  if (r <= 0.55) return 1;

}

function applyWHSettle() {

    capPos.setY(i, CAP_TOP - v * capSettleBump(x, z));
  }

    capPos.setY(i, WASTE_TOP - v * capSettleBump(x, z));

  capPos.needsUpdate = true; capGeo.computeVertexNormals();

  for (const info of g_wasteSlabInfo) {
    for (const k of info.topIdx) {
      const x = info.pos.getX(k), z = info.pos.getZ(k);
      info.pos.setY(k, info.y_top - v * capSettleBump(x, z));
    }
    for (const k of info.botIdx) {
      const x = info.pos.getX(k), z = info.pos.getZ(k);
      info.pos.setY(k, info.y_bot - v * capSettleBump(x, z));

    info.pos.needsUpdate = true; info.geom.computeVertexNormals();

      for (const k of layer.outerBotIdx) {

        layer.pos.setY(k, PIT_BOT + layer.d0 - v * capSettleBump(x, z));

  if (typeof g_poolBotIdx !== 'undefined') {
    for (const i of g_poolBotIdx) {

    const canvas = document.createElement('canvas');

      map: tex, color: 0xaadc3a,

  };

  // canvas는 흰색으로 그림 → material color(0xaadc3a)가 실제 색상을 결정 → pool과 톤 일치
  const drawSeg = (ctx, w2c, pts, wStart, wEnd) => {
    ctx.strokeStyle = '#ffffff';
    for (let i = 0; i < pts.length - 1; i++) {
      const t = pts.length > 2 ? i / (pts.length - 2) : 0;
      const w = wStart + (wEnd - wStart) * t;
      ctx.lineWidth = w * RES;
      ctx.beginPath();
      const [c1x, c1y] = w2c(pts[i][0], pts[i][1]);
      const [c2x, c2y] = w2c(pts[i + 1][0], pts[i + 1][1]);
      ctx.moveTo(c1x, c1y);
      ctx.lineTo(c2x, c2y);
      ctx.stroke();
    }
  };

  // ── Mesh 0: 크랙 채움 (사다리꼴 fill, buildCracks gapSpecs 그대로) ──
  const meshCrackFill = createMesh((ctx, w2c) => {
    ctx.fillStyle = '#ffffff';
    CRACK_DATA.forEach(({ xc, wTop, wBot }) => {
      const [x1, y1] = w2c(xc - wTop / 2, CRACK_TOP);
      const [x2, y2] = w2c(xc + wTop / 2, CRACK_TOP);
      const [x3, y3] = w2c(xc + wBot / 2, CRACK_BOT);
      const [x4, y4] = w2c(xc - wBot / 2, CRACK_BOT);
      ctx.beginPath();
      ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.lineTo(x3, y3); ctx.lineTo(x4, y4);
      ctx.closePath(); ctx.fill();
    });
  });

  // ── Mesh 1: 크랙 → 연약점토층 침투 (크랙당 4개 경로) ──
  const meshDrip = createMesh((ctx, w2c) => {
    CRACK_DATA.forEach(({ xc, wTop, wBot }, i) => {
      const seed = xc * 0.13;
      const jit = (n) => Math.sin(seed + n) * 3;
      const w0 = Math.max(wTop, 8);   // 크랙 폭만큼 두껍게

      // (1) 중앙 수직 drip — 크랙 폭 그대로 → 기반암
      drawSeg(ctx, w2c, [
        [xc + jit(1), CRACK_BOT],
        [xc + jit(2), CRACK_BOT - 25],
        [xc + jit(3), CRACK_BOT - 50],
        [xc + jit(4), BEDROCK_Y]
      ], w0, Math.max(w0 * 0.5, 5));

      // (2) 좌측 긴 lateral — 연약점토층 안에서 좌측으로 길게 뻗음 (기반암 도달 X)
      drawSeg(ctx, w2c, [
        [xc + jit(5), CRACK_BOT - 6],
        [xc - 70, CRACK_BOT - 12 + jit(6)],
        [xc - 160, CRACK_BOT - 17],
        [xc - 240, CRACK_BOT - 22 + jit(7)],
        [xc - 310 + jit(8), CRACK_BOT - 26]
      ], w0 * 0.75, 3);

      // (3) 우측 긴 lateral
      drawSeg(ctx, w2c, [
        [xc + jit(9), CRACK_BOT - 6],
        [xc + 70, CRACK_BOT - 12 + jit(10)],
        [xc + 160, CRACK_BOT - 17],
        [xc + 240, CRACK_BOT - 22 + jit(11)],
        [xc + 310 + jit(12), CRACK_BOT - 26]
      ], w0 * 0.75, 3);

      // (4) 깊은 V-spread — 좌아래→중앙아래→우아래, 연약점토층 깊은 곳에서 넓게 확산
      drawSeg(ctx, w2c, [
        [xc - 180 + jit(13), CRACK_BOT - 50],
        [xc - 100, CRACK_BOT - 60],
        [xc + jit(14), CRACK_BOT - 65],
        [xc + 100, CRACK_BOT - 60],
        [xc + 180 + jit(15), CRACK_BOT - 50]
      ], w0 * 0.5, w0 * 0.5);
    });
  }, [g_plumeClipDrip]);

  // ── Mesh 2: 기반암 상부 pool (수평 밴드, 6개 crack 하단 연결) ──
  const meshBand = createMesh((ctx, w2c) => {
    drawSeg(ctx, w2c, [[150, SPREAD_Y], [200, SPREAD_Y - 2], [330, SPREAD_Y + 1], [465, SPREAD_Y - 1], [560, SPREAD_Y]], 16, 14);
    drawSeg(ctx, w2c, [[160, SPREAD_Y - 8], [360, SPREAD_Y - 6], [545, SPREAD_Y - 8]], 10, 10);
  });

  // ── Mesh 3: 좌측 확산 (crack 좌단 x=185 → 좌측으로 확산) ──
  const meshLeft = createMesh((ctx, w2c) => {
    drawSeg(ctx, w2c, [[185, SPREAD_Y], [50, SPREAD_Y + 1], [-100, SPREAD_Y - 2], [-260, SPREAD_Y + 2], [-420, SPREAD_Y - 1], [-580, SPREAD_Y + 1], [-740, SPREAD_Y - 2], [-900, SPREAD_Y]], 14, 3);
    drawSeg(ctx, w2c, [[185, SPREAD_Y - 8], [40, SPREAD_Y - 10], [-120, SPREAD_Y - 7], [-300, SPREAD_Y - 12], [-500, SPREAD_Y - 8], [-700, SPREAD_Y - 10], [-880, SPREAD_Y - 8]], 10, 3);
    drawSeg(ctx, w2c, [[-900, SPREAD_Y], [-980, SPREAD_Y - 4]], 4, 2);
    drawSeg(ctx, w2c, [[-880, SPREAD_Y - 8], [-960, SPREAD_Y - 12]], 3, 2);
    drawSeg(ctx, w2c, [[-740, SPREAD_Y - 2], [-780, SPREAD_Y + 8]], 3, 2);
    drawSeg(ctx, w2c, [[-420, SPREAD_Y - 1], [-440, SPREAD_Y + 10]], 3, 2);
  }, [g_plumeClipLeft]);

  // ── Mesh 4: 우측 확산 (crack 우단 x=530 → 우측으로 확산) ──
  const meshRight = createMesh((ctx, w2c) => {
    drawSeg(ctx, w2c, [[530, SPREAD_Y], [650, SPREAD_Y + 1], [780, SPREAD_Y - 2], [900, SPREAD_Y + 1], [1020, SPREAD_Y]], 14, 3);
    drawSeg(ctx, w2c, [[530, SPREAD_Y - 8], [680, SPREAD_Y - 10], [840, SPREAD_Y - 7], [980, SPREAD_Y - 10]], 10, 3);
    drawSeg(ctx, w2c, [[1020, SPREAD_Y], [1090, SPREAD_Y - 4]], 4, 2);
    drawSeg(ctx, w2c, [[980, SPREAD_Y - 10], [1050, SPREAD_Y - 6]], 3, 2);
    drawSeg(ctx, w2c, [[780, SPREAD_Y - 2], [820, SPREAD_Y + 8]], 3, 2);
  }, [g_plumeClipRight]);

  grp.userData = { meshCrackFill, meshDrip, meshBand, meshLeft, meshRight };
  grp.visible = false; scene.add(grp); return grp;
}

function play() {
  resetWorld();
  const M = gsap.timeline();

  // 지층 명칭 라벨: 시작부터 계속 표시 (씬1은 최상단이 '바다')
  M.call(() => setLayerTags(true), null, 0.4);

  // ================= 씬 1 — 바다 =================
  say(M, 0.2, '원래 이곳은 <span class="hl">바다</span>였습니다.');
  M.to({}, { duration: 3.4 });   // 파도 감상

  // ================= 씬 2 — 준설토 매립 (바다를 준설토로 메움) =================
  const s2 = 3.6;
  say(M, s2, '바다를 <span class="hl">준설토로 메워</span> 땅을 만듭니다.');
  M.to(fillState, { grow: 1, duration: 4.4, ease: 'power1.inOut', onUpdate: updateFill }, s2 + 0.2);
  // 매립토가 수면을 넘어서면 바닷물 사라짐
  M.to([surfMat, seaMat], { opacity: 0, duration: 1.4, ease: 'power1.in' }, s2 + 3.6);
  M.add(() => { sea.visible = false; waterCol.visible = false; }, s2 + 5.0);
  // 매립 완료 → 최상단 라벨 '바다' → '매립층(준설토)'로 교체 + 임시 fill → 정식 fill 지오메트리로 전환
  M.add(() => {
    document.getElementById('ltFill').innerHTML = '매립층<small>(준설토)</small>';
    tempFill.visible = false;
    g_fillL.visible = true; g_fillR.visible = true;
    g_pitFill.visible = true; g_backFill.visible = true;
  }, s2 + 4.8);

  // ================= 씬 6 — 부지 굴착 =================
  // 씬1·2 총 소요 시간(약 10초) 이후 굴착 시작
  const SS = 10.0;
  say(M, SS + 0.2, '<span class="hl">준설토로 매립한 땅</span>을 굴착해 <span class="hl">폐기물 매립 셀</span>을 만듭니다.');
  // 굴착기는 우측 단단한 지반(벤치, x>900) 위에 서서 팔만 셀 안으로 뻗어 굴착
  const BENCH_X = 1060;
  M.add(() => { g_dig.exc.visible = true; }, SS);
  M.fromTo(g_dig.exc.position, { x: 1340, y: GROUND, z: FRONT }, { x: BENCH_X, y: GROUND, z: FRONT, duration: 1.2, ease: 'power2.out' }, SS + 0.2);

  // 3회 굴착 사이클 — 사용자 계획: 1) 매립층 절반 2) 나머지 매립층 + 연약점토층 일부 3) 최종
  const CYC = 1.9, cyc0 = SS + 1.7;
  const digTipX = BENCH_X - 470;
  const digLevels = [-60, -220, PIT_BOT];   // 사이클별 목표 y (매립층 절반=-60, 연약점토층 일부=-220, 최종=-290)
  for (let i = 0; i < 3; i++) {
    const at = cyc0 + i * CYC;
    const lvl = digLevels[i];
    const df = (GROUND - lvl) / (GROUND - PIT_BOT);   // 깊이 진행률 0~1 (실제 깊이 기준)
    // 굴착 자세 — 사이클마다 팔이 더 깊게 뻗도록 poses 조정 (더 깊은 곳까지 도달)
    const digB = POSE.dig[0] - df * 0.22;
    const digS = POSE.dig[1] - df * 0.28;
    const digK = POSE.dig[2] - df * 0.12;
    M.to(g_dig.boomG.rotation, { z: digB, duration: 0.55, ease: 'power2.inOut' }, at);
    M.to(g_dig.stickG.rotation, { z: digS, duration: 0.55, ease: 'power2.inOut' }, at);
    M.to(g_dig.bucketG.rotation, { z: digK, duration: 0.55, ease: 'power2.inOut' }, at);
    // 셀 토사 제거 — 팔이 dig 자세 되고 나서 1/3씩 하강 (power2.out으로 스쿱 느낌)
    M.to(g_digClip, { constant: lvl, duration: 0.9, ease: 'power2.out' }, at + 0.5);
    // 먼지 3발 — 굴착 순간·직후 (위치 랜덤)
    M.call(spawnDust, [digTipX + rnd(-40, 40), GROUND - 30 - df * 40, FRONT], at + 0.55);
    M.call(spawnDust, [digTipX + rnd(-40, 40), GROUND - 30 - df * 40, FRONT], at + 0.80);
    M.call(spawnDust, [digTipX + rnd(-40, 40), GROUND - 30 - df * 40, FRONT], at + 1.05);
    // 들어올림 자세(상차 모션)
    M.to(g_dig.boomG.rotation, { z: POSE.lift[0], duration: 0.55, ease: 'power2.inOut' }, at + 1.05);
    M.to(g_dig.stickG.rotation, { z: POSE.lift[1], duration: 0.55, ease: 'power2.inOut' }, at + 1.05);
    M.to(g_dig.bucketG.rotation, { z: POSE.lift[2], duration: 0.55, ease: 'power2.inOut' }, at + 1.05);
  }
  const endC = cyc0 + 3 * CYC;
  // 굴착기 퇴장
  M.to(g_dig.boomG.rotation, { z: POSE.rest[0], duration: 0.6 }, endC);
  M.to(g_dig.stickG.rotation, { z: POSE.rest[1], duration: 0.6 }, endC);
  M.to(g_dig.bucketG.rotation, { z: POSE.rest[2], duration: 0.6 }, endC);
  M.to(g_dig.exc.position, { x: 1360, duration: 1.3, ease: 'power1.in' }, endC + 0.3);
  M.add(() => { g_dig.exc.visible = false; }, endC + 1.6);
  say(M, endC + 0.5, '굴착된 <span class="hl">매립 셀</span>이 완성됐습니다.');

  // ================= 씬 7 — 진공압밀 =================
  const s7 = endC + 2.4;
  // ① PBD 배수재를 셀 바닥에서 기반암까지 관입
  say(M, s7, '<span class="hl">진공압밀 공법</span> — 배수재(PBD)를 <span class="hl">기반암까지</span> 박습니다.');

  M.fromTo(g_stit.rig.position, { y: GROUND + 70 }, { y: CELL_FLOOR, duration: 0.9, ease: 'power2.out' }, s7 + 0.1);   // 셀 바닥으로 내려옴
  let vt = s7 + 1.5;
  for (let i = 0; i < VN; i++) {
    const dr = g_vdrains[i];
    M.to(g_stit.mandrelGroup.position, { y: -vH, duration: 0.32, ease: 'power2.in' }, vt);            // 관입(하강)
    M.call(spawnDust, [dr.x, CELL_FLOOR, FRONT], vt + 0.3);
    M.call(() => { dr.d.visible = true; }, null, vt + 0.34);
    M.to(g_stit.mandrelGroup.position, { y: 0, duration: 0.44, ease: 'power1.out', onUpdate: () => { dr.grow = Math.max(0, Math.min(1, 1 + g_stit.mandrelGroup.position.y / vH)); dr.d.scale.y = dr.grow; } }, vt + 0.4);
    if (i < VN - 1) M.to(g_stit.rig.position, { x: g_vdrains[i + 1].x, duration: 0.4, ease: 'power1.inOut' }, vt + 0.86);
    vt += 1.0;
  }
  M.to(g_stit.rig.position, { y: GROUND + 90, duration: 1.0, ease: 'power1.in' }, vt);                // 셀 밖으로 인양
  M.add(() => { g_stit.rig.visible = false; }, vt + 1.0);

  // ② 배수층 + 가로 집수관 (자막 없이 설치)
  const s7b = vt + 1.3;
  M.add(() => { g_blanket.visible = true; g_vcoll.visible = true; }, s7b);
  M.fromTo(g_blanket.scale, { y: 0.02 }, { y: 1, duration: 0.6, ease: 'power2.out' }, s7b);
  M.fromTo(g_vcoll.scale, { x: 0 }, { x: 1, duration: 0.7, ease: 'power2.out' }, s7b + 0.3);

  // ③ 기밀 멤브레인 밀봉 — 좌→우로 펼쳐 덮은 뒤 가장자리를 묻어 밀봉
  const s7c = s7b + 1.3;
  say(M, s7c, '전체를 <span class="hl">기밀 멤브레인</span>으로 덮어 <span class="hl">완전히 밀봉</span>합니다.');
  M.set(g_memb.position, { y: MEMB_Y }, s7c);
  M.add(() => { g_memb.visible = true; }, s7c);
  M.fromTo(membClip, { constant: -MEMB_HW - 14 }, { constant: MEMB_HW + 14, duration: 1.6, ease: 'power1.inOut' }, s7c);   // 시트가 좌→우로 펼쳐짐
  // 가장자리 밀봉 berm을 트렌치에 묻음(좌·우)
  M.add(() => { g_seals.forEach(m => m.visible = true); }, s7c + 1.5);
  g_seals.forEach((m, i) => M.fromTo(m.scale, { y: 0.05 }, { y: 1, duration: 0.5, ease: 'back.out(1.6)' }, s7c + 1.5 + i * 0.12));

  // ④ 진공펌프 가동 — 대기압이 균일하게 재하 (진공압 천천히 상승)
  const s7d = s7c + 2.7;
  say(M, s7d, '<span class="hl">진공펌프</span>로 공기를 빼면 <span class="hl">대기압</span>이 지반을 균일하게 누릅니다.');
  M.add(() => { g_pump.visible = true; g_hose.visible = true; g_outlet.visible = true; g_dtank.visible = true; g_atm.visible = true; vacuuming = true; }, s7d);
  M.from(g_pump.position, { y: GROUND + 80, duration: 0.6, ease: 'back.out(1.4)' }, s7d);
  M.fromTo(g_atm.scale, { y: 0.01 }, { y: 1, duration: 0.6, ease: 'back.out(1.5)' }, s7d + 0.2);
  // 진공압 0 → -80 kPa 를 6초에 걸쳐 천천히 (기존 2.8초 → 6.0초, sine.inOut로 부드럽게)
  M.to(g_vac, { kpa: -80, duration: 6.0, ease: 'sine.inOut' }, s7d + 0.3);

  // ⑤ 간극수 배출 — 진공압 -40 kPa 도달 시점(약 s7d+3.3)에 다음 자막 + 렌즈 + PBD 물 상승 시작
  const s7e = s7d + 3.3;   // 진공압이 절반(-40 kPa) 넘긴 후 배수 표현 시작
  say(M, s7e, '간극수가 <span class="hl">PBD를 타고 올라온 뒤</span> 집수관을 따라 펌프로 배출됩니다.');
  M.add(() => { g_vdrains.forEach(o => o.w.visible = true); g_vcollWater.visible = true; g_hoseWater.visible = true; }, s7e);
  g_vdrains.forEach((o, i) => M.fromTo(o.w.scale, { y: 0 }, { y: 1, duration: 2.2, ease: 'none' }, s7e + 0.2 + i * 0.06));   // ① PBD 상승(먼저)
  M.fromTo(g_vcollWater.scale, { x: 0 }, { x: 1, duration: 2.2, ease: 'none' }, s7e + 3.0);                                  // ② 가로관 좌→우
  M.fromTo(g_hoseWater.scale, { y: 0 }, { y: 1, duration: 2.4, ease: 'power1.in' }, s7e + 5.2);                              // ③ 호스로 물 상승(펌프까지)
  M.fromTo(g_dischargeWater.scale, { y: 0 }, { y: 0.92, duration: 4.0, ease: 'none' }, s7e + 7.4);                          // ④ 배출탱크 차오름
  M.fromTo(lensWaterP, { p: 0 }, { p: 1, duration: 9.5, ease: 'none' }, s7e + 0.2);                                          // 렌즈 미시: 간극수 PBD 배출(선형)

  // ⑥ 압밀·침하 (멤브레인 sag + 레벨 하강)
  M.to(g_vacSet, { v: VAC_SET_MAX, duration: 9.5, ease: 'sine.inOut', onUpdate: applyVacSettle }, s7e + 1.0);
  say(M, s7e + 11.4, '물이 빠지며 지반이 <span class="hl">압밀·침하</span>되어 단단해집니다.');

  // ================= 씬 8 — 차수 라이너 시스템 =================
  const s8 = s7e + 13.0;
  // 진공압밀 장비 철거(멤브레인·펌프·호스·배출탱크·대기압 화살표·집수관·배수층)
  M.add(() => {
    g_memb.visible = false; g_pump.visible = false; g_hose.visible = false; g_outlet.visible = false;
    g_dtank.visible = false; g_atm.visible = false; g_vcoll.visible = false; g_vcollWater.visible = false;
    g_hoseWater.visible = false;
    g_blanket.visible = false; g_vdrains.forEach(o => o.w.visible = false); g_seals.forEach(m => m.visible = false);
    vacuuming = false;
  }, s8);
  // 연약점토층에 박았던 PBD를 한꺼번에 인발 → 하늘로 사라짐 (동시 상승)
  say(M, s8, '지반개량을 마친 <span class="hl">배수재(PBD)</span>를 제거합니다.');
  g_vdrains.forEach((o) => {
    M.to(o.d.position, { y: 540, duration: 0.7, ease: 'power1.in' }, s8 + 0.4);
    M.add(() => { o.d.visible = false; }, s8 + 1.1);
  });
  const pbdEnd = s8 + 1.7;
  say(M, pbdEnd, '개량된 지반 위에 <span class="hl">차수 라이너 시스템</span>을 시공합니다.');
  // 4개 층을 바닥→위로 순차 적층 (자막 1초 더 유지)
  let lt = pbdEnd + 2.2;
  g_liner.forEach((L, idx) => {
    say(M, lt, L.name);
    M.add(() => { L.layer.m.visible = true; L.layer.bm.visible = true; }, lt);
    M.fromTo(L.layer.clip, { constant: PIT_BOT - 6 }, { constant: GROUND + 60, duration: 1.1, ease: 'power1.inOut' }, lt);
    if (idx === 3) {
      // 배수 자갈층 시공과 함께 오염수처리시설 + 흡입관(파이프·플랜지·노즐) 모두 설치
      M.add(() => {
        g_treatPlant.visible = true;
        g_intakePipe.visible = true; g_pipeFlange.visible = true; g_intakeNozzle.visible = true;
        setTfTag(true);
      }, lt + 0.9);
      M.fromTo(g_treatPlant.scale, { y: 0.02, x: 1, z: 1 }, { y: 1, duration: 0.8, ease: 'back.out(1.4)' }, lt + 0.9);
    }
    lt += 1.9;
  });
  say(M, lt + 0.2, '폐기물을 안전하게 가두는 <span class="hl">차수 라이너</span>가 완성됐습니다.');

  // ================= 씬 9 — 폐기물 단계 매립 (색상·위치 다른 덤프트럭 4대가 순차 진입) =================
  const s9 = lt + 2.2;
  say(M, s9, '라이너 위에 폐기물을 <span class="hl">층층이 매립</span>합니다.');
  M.add(() => {
    g_waste.forEach(m => m.visible = true); g_debris.visible = true;
    // 4대 모두 초기 상태: 홈(우측 화면 밖)에서 대기, 짐칸 수평
    g_trucks.forEach(t => {
      t.g.position.set(t.homeX, GROUND, t.z);
      t.bedGroup.rotation.z = 0;
      t.g.visible = false;
    });
  }, s9);
  const CYCLE = 3.0;
  let wt = s9 + 1.0;
  for (let i = 0; i < NLIFT; i++) {
    const t = g_trucks[i];    // i번째 트럭 (색상·z 서로 다름)
    const y1 = WASTE_BOT + (i + 1) * liftH;
    const at = wt + i * CYCLE;
    // ① 이번 사이클 트럭만 등장 (진입 시점에 visible 활성)
    M.add(() => { t.g.visible = true; t.g.position.set(t.homeX, GROUND, t.z); t.bedGroup.rotation.z = 0; }, at);
    // ② 진입 (홈 → pour, 0.5s)
    M.to(t.g.position, { x: t.pourX, duration: 0.5, ease: 'power2.out' }, at);
    // ③ 짐칸 기울임 (0.4s)
    M.to(t.bedGroup.rotation, { z: 0.6, duration: 0.4, ease: 'power2.inOut' }, at + 0.5);
    // ④ 폐기물 매립층 한 칸 채움 (기울인 상태에서 1.4s)
    M.to(g_wasteClip, { constant: y1 + 4, duration: 1.4, ease: 'power1.inOut' }, at + 0.9);
    // ⑤ 짐칸 원위치 (0.3s)
    M.to(t.bedGroup.rotation, { z: 0, duration: 0.3, ease: 'power2.inOut' }, at + 2.3);
    // ⑥ 퇴장 (pour → 홈, 0.4s), 완료 후 hide
    M.to(t.g.position, { x: t.homeX, duration: 0.4, ease: 'power2.in' }, at + 2.6);
    M.add(() => { t.g.visible = false; }, at + 3.0);
    if (i === 1) say(M, at + 0.9, '매 층마다 <span class="hl">일일 복토</span>로 덮어 다집니다.');
  }
  wt = s9 + 1.0 + NLIFT * CYCLE;
  say(M, wt + 0.3, '폐기물이 <span class="hl">계획고까지</span> 안정적으로 매립됐습니다.');

  // ================= 씬 10 — 침출수 발생·집적 =================
  const s10 = wt + 2.2;
  say(M, s10, '매립을 하면서 <span class="hl">빗물</span>이 스며들며 <span class="hl">오염수</span>가 생성됩니다.');
  M.add(() => { g_rainPts.visible = true; g_leachPool.visible = true; collecting = true; }, s10);
  // 비 시작과 동시에 풀 충전 시작 (synchronized)
  const POOL_FILL = 9.0, POOL_FULL = POOL_BOT + 2 * (POOL_MAX - POOL_BOT) / 3;   // 기존의 2배 높이까지
  M.fromTo(g_poolClip, { constant: POOL_BOT - 6 }, { constant: POOL_FULL, duration: POOL_FILL, ease: 'none', immediateRender: false }, s10);
  const s10b = s10 + 3.2;
  say(M, s10b, '생성된 오염수는 <span class="hl">차수층</span>에 의해 밖으로 새지 않게 가둬집니다.');
  const s10c = s10 + 6.4;
  say(M, s10c, '오염수의 수위는 <span class="hl">5M 수준</span>으로 관리하며,');
  // 풀이 가득 차면 비가 멈춤
  const rainStop = s10 + POOL_FILL;
  M.add(() => { collecting = false; gsap.to(g_rainPts.material, { opacity: 0, duration: 1.0, onComplete: () => { g_rainPts.visible = false; } }); }, rainStop);
  say(M, rainStop + 0.2, '<span class="hl">오염수처리시설</span>을 통해 정화 후 외부로 반출됩니다.');

  // ================= 씬 11 — 오염수 처리: 흡입 시작 → 풀 배수 (씬 10 자막 "오염수처리시설을 통해 정화..." 지속) =================
  const s11 = rainStop + 2.2;
  // 씬 11 자막 제거 — 씬 10의 "오염수처리시설을 통해 정화 후 외부로 반출됩니다" 자막이 씬 12까지 유지되도록
  const s11c = s11 + 2.2;
  M.add(() => { g_intakeWater.visible = true; }, s11c);
  const PIPE_RISE = 4.0;
  M.fromTo(g_intakeWater.scale, { y: 0 }, { y: 1, duration: PIPE_RISE, ease: 'power1.in' }, s11c);
  // 풀 배수 — 흡입관 상승과 동기. 풀이 가득(POOL_FULL) → 바닥(POOL_BOT-6)
  M.fromTo(g_poolClip, { constant: POOL_FULL }, { constant: POOL_BOT - 6, duration: PIPE_RISE + 0.6, ease: 'power1.in', immediateRender: false }, s11c);

  // ================= 씬 12 — 최종복토 + 우측 물류창고 =================
  // 처리시설·파이프·물기둥은 그대로 유지(visible 변경 없음)
  const s12 = s11c + PIPE_RISE + 2.4;
  say(M, s12, '폐기물매립을 종료하기 위해 <span class="hl">최종복토</span> 합니다.');
  M.add(() => { g_cap.visible = true; setCapTag(true); }, s12);
  M.fromTo(g_capClip, { constant: CAP_BOT - 4 }, { constant: CAP_TOP + 8, duration: 2.4, ease: 'power1.inOut' }, s12);
  const s12b = s12 + 3.4;
  say(M, s12b, '최종복토 후 해당부지는 <span class="hl">물류시설</span>로 사용이 가능합니다.');
  M.add(() => { g_warehouse.visible = true; g_warehouse.scale.set(1, 1, 1); setWhTag(true); }, s12b);
  M.fromTo(g_warehouse.scale, { y: 0.02 }, { y: 1, duration: 0.9, ease: 'back.out(1.3)' }, s12b);
  say(M, s12b + 3.2, '<span class="hl">물류시설</span>로 부지를 사용하더라도,');

  // 최종복토 직후 ~ 물류창고 직후: 시간이 흘러 다시 비가 내리고 오염수가 부분적으로 차오름
  const s12c = s12b + 4.6;
  const POOL_PARTIAL = POOL_BOT + (POOL_FULL - POOL_BOT) * 0.55;
  say(M, s12c, '<span class="hl">빗물</span>에 의해 매립지 내부에 오염수는 생성됩니다.');
  M.add(() => { g_rainPts.visible = true; g_leachPool.visible = true; collecting = true; gsap.set(g_rainPts.material, { opacity: 0.98 }); }, s12c);
  M.fromTo(g_poolClip, { constant: POOL_BOT - 6 }, { constant: POOL_PARTIAL, duration: 5.0, ease: 'none', immediateRender: false }, s12c);
  const rainStop2 = s12c + 5.0;
  M.add(() => { collecting = false; gsap.to(g_rainPts.material, { opacity: 0, duration: 0.8, onComplete: () => { g_rainPts.visible = false; } }); }, rainStop2);

  // ================= 씬 13 — 물류창고 하중 → 침하 (hero3d 성토 침하 패턴 참조: sine.inOut 점진) =================
  const s13 = rainStop2 + 1.6;
  say(M, s13, '시간이 지나면서 <span class="hl">물류시설의 하중</span>이 차수층 아래 원지반에 누적됩니다.');
  M.add(() => { g_loadArrows.visible = true; whLensActive = true; whLensState.p = 0; }, s13);
  M.to(matLoadArrow, { emissiveIntensity: 2.4, duration: 0.4, ease: 'sine.inOut', repeat: -1, yoyo: true }, s13);
  // 렌즈: 원지반 입자 침하 애니메이션 (s13 자막 지속 동안 서서히 진행)
  M.fromTo(whLensState, { p: 0 }, { p: 1, duration: 3.0, ease: 'sine.inOut' }, s13 + 0.3);

  // 침하 — hero3d 성토 침하 패턴(settleBump + applySettle)을 따라 캡·복토·라이너·연약점토층 정점이 국부 변위
  const s13b = s13 + 3.2;
  say(M, s13b, '<span class="hl">연약점토층이 압축</span>되며 우측 매립층이 통째로 침하합니다.');
  M.to(whSettle, { v: 50, duration: 8.0, ease: 'sine.inOut', onUpdate: applyWHSettle }, s13b);
  M.to(g_warehouse.position, { y: -50, duration: 8.0, ease: 'sine.inOut' }, s13b);

  // 차수층 조각조각 파단 — 갭이 라이너 안에서 천천히 페이드인 (파편 사이로 흙이 배어나오는 느낌)
  const s13c = s13b + 2.5;
  say(M, s13c, '원지반의 침하로 인해 <span class="hl">차수층이 찢어지게</span> 됩니다.');
  M.add(() => { g_cracks.visible = true; whLensActive = false; }, s13c);   // 렌즈 종료 (침하 완료)
  g_cracks.children.forEach((c, i) => {
    const at = s13c + i * 0.55;
    M.fromTo(c.material, { opacity: 0 }, { opacity: 1, duration: 1.6, ease: 'power1.out' }, at);
  });
  M.fromTo(g_cracks.position, { y: 0 }, { y: -50, duration: 5.5, ease: 'sine.inOut' }, s13c);

  // 오염수 실시간 흐름: pool → crack 채움 → drip 하강 → 기반암 밴드 → 좌우 확산
  const s13d = s13c + 3.5;
  say(M, s13d, '쌓인 오염수가 <span class="hl">차수층의 찢어진 곳</span>을 통해 외부로 누출됩니다.');
  M.add(() => { g_plume.visible = true; }, s13d);

  const P = g_plume.userData;

  // Phase 1 (t=0~1.5s): 크랙 채움 - pool에서 크랙으로 흘러들어옴
  M.fromTo(P.meshCrackFill.material, { opacity: 0 }, { opacity: 0.82, duration: 1.5, ease: 'power1.in' }, s13d);

  // Phase 2 (t=1.0~3.0s): 크랙 → 연약점토층 스며듦 + 기반암. clip plane으로 위→아래 reveal
  M.set(g_plumeClipDrip, { constant: 340 }, s13d);   // 초기: drip 전부 hide
  M.set(P.meshDrip.material, { opacity: 0.82 }, s13d + 1.0);
  M.to(g_plumeClipDrip, { constant: 425, duration: 2.0, ease: 'sine.in' }, s13d + 1.0);   // 위→아래 노출

  // Phase 3 (t=3.0~4.0s): 기반암 상부 pool 밴드 형성 (crack drip 도달 직후)
  M.fromTo(P.meshBand.material, { opacity: 0 }, { opacity: 0.82, duration: 1.0, ease: 'sine.out' }, s13d + 3.0);

  // Phase 4 (t=3.5~7s): 좌우로 확산 - clip plane으로 center→outward reveal
  M.set(g_plumeClipLeft, { constant: -190 }, s13d);   // 초기: 좌측 확산 hide
  M.set(P.meshLeft.material, { opacity: 0.82 }, s13d + 3.5);
  M.to(g_plumeClipLeft, { constant: 970, duration: 3.5, ease: 'power1.out' }, s13d + 3.5);   // center→left 노출

  M.set(g_plumeClipRight, { constant: 525 }, s13d);   // 초기: 우측 확산 hide
  M.set(P.meshRight.material, { opacity: 0.82 }, s13d + 3.5);
  M.to(g_plumeClipRight, { constant: 1100, duration: 3.5, ease: 'power1.out' }, s13d + 3.5);   // center→right 노출

  // Pool 수위 하강 — 유출과 동기 (7초 전체에 걸쳐 서서히 감소)
  M.to(g_poolClip, { constant: POOL_BOT - 6, duration: 7.0, ease: 'sine.inOut' }, s13d);

  M.to({}, { duration: 3.0 });
  return M;
}
let timeline = play();

// ---------- 렌더 루프 ----------
const clock = new THREE.Clock();
function frame() {
  updateSea(clock.getElapsedTime());   // 씬1·2 파도 애니메이션
  if (layerTagsOn) updateLayerTags();
  if (vacuuming) {
    vacGaugeEl.style.opacity = '1'; drawVacGauge(g_vac.kpa);
    _gV.copy(GAUGE_ANCHOR).project(camera);   // 게이지를 진공펌프 옆에 배치
    vacGaugeEl.style.left = ((_gV.x * 0.5 + 0.5) * innerWidth) + 'px';
    vacGaugeEl.style.top = ((-_gV.y * 0.5 + 0.5) * innerHeight) + 'px';
    const v = g_vacSet.v;
    _vlvlV.set(PIT_BOTHW + 30, MEMB_Y, FRONT).project(camera);
    levelTag.style.left = ((_vlvlV.x * 0.5 + 0.5) * innerWidth) + 'px';
    levelTag.style.top = ((-_vlvlV.y * 0.5 + 0.5) * innerHeight) + 'px';
    levelTag.textContent = '침하 ' + (v / VAC_SET_MAX * VAC_SET_M).toFixed(2) + ' m';
    levelTag.style.opacity = '1';
    // 렌즈(미시 단면) + 콜아웃 지시선
    lensWrap.style.opacity = '1'; callout.style.opacity = '1'; updateCallout();
    drawLens(Math.min(1, g_vacSet.v / VAC_SET_MAX), Math.min(1, lensWaterP.p), clock.getElapsedTime());
  } else if (whLensActive) {
    // 씬13: 물류시설 아래 원지반 침하 렌즈
    lensWrap.style.opacity = '1'; callout.style.opacity = '1'; updateCallout(coSrcWh);
    drawWhLens(Math.min(1, whLensState.p), clock.getElapsedTime());
    vacGaugeEl.style.opacity = '0'; levelTag.style.opacity = '0';
  } else { vacGaugeEl.style.opacity = '0'; levelTag.style.opacity = '0'; lensWrap.style.opacity = '0'; callout.style.opacity = '0'; }
  if (collecting) { updateRain(); }
  if (tfTagOn) updateTfTag();
  if (capTagOn) updateCapTag();
  if (whTagOn) updateWhTag();
  renderer.render(scene, camera); requestAnimationFrame(frame);
}
frame();

// ---------- 리사이즈 ----------
// 반응형 카메라: 좁은 화면(모바일 세로)에서 수직 FOV를 확대해 수평 시야각 최소값(60°) 보장
const BASE_FOV = 38, MIN_HFOV = 60;
function resize() {
  renderer.setSize(innerWidth, innerHeight, false);
  camera.aspect = innerWidth / innerHeight;
  const reqVFov = 2 * Math.atan(Math.tan(MIN_HFOV * Math.PI / 360) / camera.aspect) * 180 / Math.PI;
  camera.fov = Math.max(BASE_FOV, reqVFov);
  camera.updateProjectionMatrix();
}
addEventListener('resize', resize); resize();

// ---------- 컨트롤 / 씬 내비게이션 ----------
const SCENES = [
  { n: '씬 1 · 바다', t: 0 },
  { n: '씬 2 · 준설토 매립', t: 3.6 },
  { n: '씬 6 · 부지 굴착', t: 10.0 },
  { n: '씬 7 · 진공압밀', t: 19.8 },
  { n: '씬 8 · 차수 라이너', t: 49.9 },
  { n: '씬 9 · 폐기물 매립', t: 63.6 },
  { n: '씬 10 · 침출수 집적', t: 78.8 },
  { n: '씬 11 · 오염수 처리', t: 90.0 },
  { n: '씬 12 · 최종복토·창고', t: 99.0 },
  { n: '씬 13 · 침하·오염수 누출', t: 113.0 }
];
const sceneLabel = document.getElementById('scenelabel');
const pauseBtn = document.getElementById('pause');
let paused = false;
function setPaused(p) { paused = p; if (p) { timeline.pause(); pauseBtn.textContent = '▶ 재생'; } else { timeline.resume(); pauseBtn.textContent = '⏸ 일시정지'; } }
pauseBtn.addEventListener('click', () => setPaused(!paused));
function curSceneIndex() { const now = timeline.time(); let idx = 0; for (let i = 0; i < SCENES.length; i++) if (now >= SCENES[i].t - 0.01) idx = i; return idx; }
function gotoScene(i) { i = Math.max(0, Math.min(SCENES.length - 1, i)); timeline.kill(); timeline = play(); timeline.time(SCENES[i].t); sceneLabel.textContent = SCENES[i].n; setPaused(false); }
document.getElementById('prev').addEventListener('click', () => gotoScene(curSceneIndex() - 1));
document.getElementById('next').addEventListener('click', () => gotoScene(curSceneIndex() + 1));
gsap.ticker.add(() => { const i = curSceneIndex(); if (sceneLabel.textContent !== SCENES[i].n) sceneLabel.textContent = SCENES[i].n; });
document.getElementById('replay').addEventListener('click', () => { timeline.kill(); timeline = play(); sceneLabel.textContent = SCENES[0].n; setPaused(false); });
const _p = new URLSearchParams(location.search);
const _t = _p.get('t');
if (_t !== null) { timeline.pause(); timeline.time(+_t); }
const _c = _p.get('cam');
if (_c) { const v = _c.split(',').map(Number); if (v.length === 6) { [cam.px, cam.py, cam.pz, cam.tx, cam.ty, cam.tz] = v; applyCam(); } }
  </script>
