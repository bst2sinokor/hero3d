<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>웅동2단계 항만배후단지 / 부산그린파워 조성 과정과 차이점</title>
<script>
// 메신저 in-app 브라우저 감지 → 외부 브라우저(Chrome/Safari)로 자동 이동
// 이유: 카톡·라인·네이버 등 in-app 브라우저는 WebGL/Three.js 렌더링 제약이 큼
(function () {
  const ua = navigator.userAgent.toLowerCase();
  const url = location.href;
  if (/kakaotalk/i.test(ua)) {
    location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(url);
    return;
  }
  if (/line\//i.test(ua)) {
    location.href = url + (url.includes('?') ? '&' : '?') + 'openExternalBrowser=1';
    return;
  }
  if (/naver\(inapp/i.test(ua)) {
    location.href = 'naversearchapp://inappbrowser?url=' + encodeURIComponent(url) + '&target=external';
    return;
  }
  if (/(instagram|fban|fbav|whatsapp)/i.test(ua) && /android/i.test(ua)) {
    location.href = 'intent://' + url.replace(/^https?:\/\//, '') +
      '#Intent;scheme=' + (url.startsWith('https') ? 'https' : 'http') +
      ';package=com.android.chrome;end';
  }
})();
</script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; background: #dcebf7;
    font-family: 'Pretendard', 'Noto Sans KR', 'Malgun Gothic', sans-serif; color: #0b1622; }

  /* ===== 선택 화면 ===== */
  #select {
    height: 100%; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 28px; padding: 30px 40px;
  }
  #select header { text-align: center; }
  #select h1 {
    margin: 0; font-size: clamp(24px, 3vw, 40px); font-weight: 900; letter-spacing: -0.02em;
  }
  #select h1 .hl { color: #0e7a52; }
  #select p.sub {
    margin: 10px 0 0; font-size: clamp(14px, 1.5vw, 19px); font-weight: 600; color: #46556b;
  }

  .cards {
    display: grid; grid-template-columns: 1fr 1fr; gap: 32px;
    width: min(1500px, 96vw); flex: 0 1 auto;
  }
  .card {
    position: relative; background: #fff; border-radius: 18px; overflow: hidden;
    box-shadow: 0 10px 34px rgba(11,22,34,0.16); cursor: pointer;
    transition: transform 0.25s ease, box-shadow 0.25s ease; border: 3px solid transparent;
  }
  .card:hover {
    transform: translateY(-6px);
    box-shadow: 0 20px 48px rgba(11,22,34,0.26);
    border-color: #ffd23f;
  }
  .thumbwrap {
    position: relative; width: 100%; aspect-ratio: 16 / 9; overflow: hidden; background: #dcebf7;
  }
  .thumbwrap iframe {
    position: absolute; left: 0; top: 0; width: 1280px; height: 720px;
    border: 0; transform-origin: 0 0; pointer-events: none;
  }
  /* 클릭 가로채기 + 호버 안내 */
  .thumbwrap .veil {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: rgba(12,22,34,0); transition: background 0.25s ease;
  }
  .thumbwrap .veil span {
    opacity: 0; transform: translateY(8px); transition: all 0.25s ease;
    background: rgba(12,22,34,0.72); color: #fff; font-size: 17px; font-weight: 800;
    padding: 10px 22px; border-radius: 12px; backdrop-filter: blur(4px);
  }
  .card:hover .veil { background: rgba(12,22,34,0.18); }
  .card:hover .veil span { opacity: 1; transform: translateY(0); }

  .card .meta { padding: 16px 22px 18px; }
  .card .meta .row { display: flex; align-items: center; gap: 10px; }
  .card .meta h2 { margin: 0; font-size: clamp(17px, 1.8vw, 24px); font-weight: 900; }
  .card .meta .badge {
    font-size: 12px; font-weight: 800; color: #fff; padding: 4px 10px; border-radius: 20px; white-space: nowrap;
  }
  .card.ungdong .badge { background: #2f6fb2; }
  .card.green .badge { background: #0e7a52; }
  .card .meta p { margin: 8px 0 0; font-size: clamp(13px, 1.3vw, 15.5px); font-weight: 600; color: #46556b; line-height: 1.5; }

  /* ===== 3D 뷰어 ===== */
  #viewer { position: fixed; inset: 0; z-index: 10; display: none; background: #dcebf7; }
  #viewer.on { display: block; }
  #viewer iframe { width: 100%; height: 100%; border: 0; display: block; }
  #btn-back {
    position: absolute; left: 22px; top: 18px; z-index: 11;
    font-family: inherit; font-size: 15px; font-weight: 700; color: #0b1622;
    background: #fff; border: none; padding: 10px 16px; border-radius: 10px; cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,0,0,0.3);
  }
  #btn-back:hover { background: #eef3f7; }

  @media (max-width: 900px) {
    #select { overflow-y: auto; justify-content: flex-start; padding: 24px 20px; gap: 20px; }
    .cards { grid-template-columns: 1fr; gap: 20px; }
  }
  @media (max-width: 600px) {
    #select { padding: 20px 14px; gap: 16px; }
    #select h1 { font-size: 20px; line-height: 1.35; }
    #select p.sub { font-size: 13px; }
    .card .meta { padding: 12px 16px 14px; }
    .card .meta h2 { font-size: 16px; }
    .card .meta .badge { font-size: 11px; padding: 3px 8px; }
    .card .meta p { font-size: 13px; }
    #btn-back { left: 10px; top: 10px; font-size: 13px; padding: 8px 12px; }
  }
</style>
</head>
<body>

<!-- ===== 선택 화면 ===== -->
<div id="select">
  <header>
    <h1>웅동2단계 항만배후단지 / 부산그린파워 <span class="hl">조성 과정과 차이점</span></h1>
    <p class="sub">두 부지의 지반처리 방식을 골라서 확인해 보세요</p>
  </header>

  <div class="cards">
    <div class="card ungdong" data-src="hero3d.html" tabindex="0" role="button" aria-label="웅동 지반처리 보기">
      <div class="thumbwrap">
        <iframe src="hero3d.html" scrolling="no" title="웅동 미리보기"></iframe>
        <div class="veil"><span>▶ 웅동 지반처리 보기</span></div>
      </div>
      <div class="meta">
        <div class="row">
          <h2>웅동2단계 항만배후부지</h2>
          <span class="badge">씬 1~5</span>
        </div>
        <p>준설토 매립 → PBD·집수정 → 성토 → 압밀·집수. 물을 짜내며 땅을 단단하게 다지는 <b>선행재하 공법</b>.</p>
      </div>
    </div>

    <div class="card green" data-src="hero3d_green.html" tabindex="0" role="button" aria-label="그린파워 지반처리 보기">
      <div class="thumbwrap">
        <iframe src="hero3d_green.html" scrolling="no" title="그린파워 미리보기"></iframe>
        <div class="veil"><span>▶ 그린파워 지반처리 보기</span></div>
      </div>
      <div class="meta">
        <div class="row">
          <h2>부산그린파워 부지</h2>
          <span class="badge">씬 6~13</span>
        </div>
        <p>부지 굴착 → 차수 라이너 → 폐기물 매립 → 침출수 관리. 라이너로 폐기물을 가둔 <b>차수성 위생매립</b> 구조.</p>
      </div>
    </div>
  </div>
</div>

<!-- ===== 3D 뷰어 ===== -->
<div id="viewer">
  <iframe id="viewer-frame" title="지반처리 3D"></iframe>
  <button id="btn-back">‹ 선택 화면</button>
</div>

<script>
(function () {
  const DESIGN_W = 1280; // 썸네일 iframe 렌더 기준 폭

  // 썸네일 iframe을 카드 폭에 맞춰 축소
  function fitThumbs() {
    document.querySelectorAll('.thumbwrap').forEach(wrap => {
      const s = wrap.clientWidth / DESIGN_W;
      wrap.querySelector('iframe').style.transform = `scale(${s})`;
    });
  }
  window.addEventListener('resize', fitThumbs);
  fitThumbs();

  // 카드 선택 → 뷰어 열기
  const viewer = document.getElementById('viewer');
  const frame = document.getElementById('viewer-frame');
  const select = document.getElementById('select');

  function open(src) {
    frame.src = src;
    viewer.classList.add('on');
    select.style.display = 'none'; // 썸네일 rAF 부하 차단
  }
  function back() {
    viewer.classList.remove('on');
    frame.src = ''; // WebGL 컨텍스트 해제
    select.style.display = '';
    fitThumbs();
  }

  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => open(card.dataset.src));
    card.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(card.dataset.src); }
    });
  });
  document.getElementById('btn-back').addEventListener('click', back);
  window.addEventListener('keydown', e => {
    if (e.key === 'Escape' && viewer.classList.contains('on')) back();
  });
})();
</script>
</body>
</html>
